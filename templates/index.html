<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Decay Detector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; padding: 30px 20px; }
    .container { max-width: 960px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 2.2rem; color: #fff; }
    header h1 span { color: #4f8ef7; }
    header p { color: #888; margin-top: 8px; }
    .card { background: #1a1d27; border: 1px solid #2a2d3e; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .input-row { display: flex; gap: 12px; }
    .input-row input { flex: 1; padding: 12px 16px; background: #0f1117; border: 1px solid #2a2d3e; border-radius: 10px; color: #e0e0e0; font-size: 1rem; }
    .input-row input:focus { outline: none; border-color: #4f8ef7; }
    .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; background: #4f8ef7; color: #fff; transition: opacity .2s; }
    .btn:hover { opacity: .85; }
    .hint { color: #555; font-size: 0.82rem; margin-top: 8px; }

    /* Summary bar */
    .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .stat { background: #1a1d27; border: 1px solid #2a2d3e; border-radius: 12px; padding: 18px; text-align: center; }
    .stat .num { font-size: 2rem; font-weight: 700; }
    .stat .lbl { color: #888; font-size: 0.82rem; margin-top: 4px; }
    .stat.danger .num { color: #f77; }
    .stat.safe .num { color: #7f7; }
    .stat.info .num { color: #4f8ef7; }

    /* File cards */
    .file-card { background: #1a1d27; border: 1px solid #2a2d3e; border-radius: 12px; padding: 18px; margin-bottom: 12px; }
    .file-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .file-name { font-weight: 600; font-size: 0.95rem; }
    .file-path { color: #555; font-size: 0.78rem; margin-top: 2px; }
    .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
    .badge.defective { background: #2a1a1a; color: #f77; border: 1px solid #f774; }
    .badge.clean { background: #1a2a1a; color: #7f7; border: 1px solid #7f74; }
    .risk-bar-wrap { margin-top: 10px; background: #0f1117; border-radius: 6px; height: 6px; overflow: hidden; }
    .risk-bar { height: 100%; border-radius: 6px; transition: width .6s; }
    .file-details { display: none; margin-top: 14px; border-top: 1px solid #2a2d3e; padding-top: 14px; }
    .file-details.open { display: block; }
    .models-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .model-box { background: #0f1117; border-radius: 8px; padding: 12px; text-align: center; }
    .model-box .verdict { font-size: 1.1rem; font-weight: 700; margin: 4px 0; }
    .model-box .conf { color: #888; font-size: 0.82rem; }
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
    .metric-item { background: #0f1117; border-radius: 8px; padding: 10px 12px; }
    .metric-item .mk { color: #888; font-size: 0.75rem; }
    .metric-item .mv { font-size: 1rem; font-weight: 600; margin-top: 2px; }
    .agree-banner { text-align: center; padding: 8px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 12px; }
    .agree-defect { background: #2a1a1a; color: #f77; }
    .agree-clean  { background: #1a2a1a; color: #7f7; }
    .disagree     { background: #2a2a1a; color: #fa7; }
    #loader { display: none; text-align: center; padding: 40px; color: #888; }
    #results { display: none; }
    .chevron { transition: transform .3s; }
    .chevron.open { transform: rotate(180deg); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Code <span>Decay</span> Detector</h1>
    <p>Point it at any Python project folder — it automatically analyses every file</p>
  </header>

  <div class="card">
    <div class="input-row">
      <input type="text" id="folderInput" placeholder="Enter full path to your Python project folder e.g. C:\Users\abrar\myproject">
      <button class="btn" onclick="analyzeFolder()">Analyze</button>
    </div>
    <p class="hint">Tip: Copy the folder path from File Explorer's address bar and paste it here</p>
  </div>

  <div id="loader">Scanning files and running predictions...</div>

  <div id="results">
    <div class="summary" id="summary"></div>
    <div id="fileList"></div>
  </div>
</div>

<script>
async function analyzeFolder() {
  const folder = document.getElementById('folderInput').value.trim();
  if (!folder) { alert('Please enter a folder path!'); return; }

  document.getElementById('loader').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  const formData = new FormData();
  formData.append('folder_path', folder);

  const res  = await fetch('/analyze', { method: 'POST', body: formData });
  const data = await res.json();

  document.getElementById('loader').style.display = 'none';

  if (data.error) { alert('Error: ' + data.error); return; }

  renderSummary(data.summary);
  renderFiles(data.results);
  document.getElementById('results').style.display = 'block';
}

function renderSummary(s) {
  document.getElementById('summary').innerHTML = `
    <div class="stat info"><div class="num">${s.total_files}</div><div class="lbl">Files scanned</div></div>
    <div class="stat danger"><div class="num">${s.defective}</div><div class="lbl">At risk</div></div>
    <div class="stat safe"><div class="num">${s.clean}</div><div class="lbl">Healthy</div></div>
    <div class="stat"><div class="num" style="color:#fa7">${s.avg_risk}%</div><div class="lbl">Avg risk score</div></div>
  `;
}

function renderFiles(results) {
  const list = document.getElementById('fileList');
  list.innerHTML = '';

  results.forEach((r, i) => {
    const isDefective = r.rf_pred === 1;
    const barColor    = r.risk_score > 70 ? '#f77' : r.risk_score > 40 ? '#fa7' : '#7f7';

    const agreeClass = r.agree
      ? (isDefective ? 'agree-defect' : 'agree-clean')
      : 'disagree';
    const agreeText = r.agree
      ? (isDefective ? 'Both models agree — defect likely' : 'Both models agree — looks healthy')
      : 'Models disagree — manual review recommended';

    const metricsHtml = Object.entries(r.metrics).map(([k, v]) => `
      <div class="metric-item">
        <div class="mk">${k}</div>
        <div class="mv">${typeof v === 'number' && v % 1 !== 0 ? v.toFixed(3) : v}</div>
      </div>`).join('');

    const card = document.createElement('div');
    card.className = 'file-card';
    card.innerHTML = `
      <div class="file-header" onclick="toggleCard(${i})">
        <div>
          <div class="file-name">${r.filename}</div>
          <div class="file-path">${r.filepath}</div>
          <div class="risk-bar-wrap" style="margin-top:8px;width:200px">
            <div class="risk-bar" style="width:${r.risk_score}%;background:${barColor}"></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="color:#888;font-size:0.82rem">Risk: ${r.risk_score}%</span>
          <span class="badge ${isDefective ? 'defective' : 'clean'}">${isDefective ? 'At risk' : 'Healthy'}</span>
          <span class="chevron" id="chev${i}">▼</span>
        </div>
      </div>
      <div class="file-details" id="det${i}">
        <div class="agree-banner ${agreeClass}">${agreeText}</div>
        <div class="models-row">
          <div class="model-box">
            <div style="color:#888;font-size:0.78rem">Random Forest</div>
            <div class="verdict" style="color:${r.rf_pred===1?'#f77':'#7f7'}">${r.rf_pred===1?'At risk':'Healthy'}</div>
            <div class="conf">${r.rf_conf}% confidence</div>
          </div>
          <div class="model-box">
            <div style="color:#888;font-size:0.78rem">SVM</div>
            <div class="verdict" style="color:${r.svm_pred===1?'#f77':'#7f7'}">${r.svm_pred===1?'At risk':'Healthy'}</div>
            <div class="conf">${r.svm_conf}% confidence</div>
          </div>
        </div>
        <div class="metrics-grid">${metricsHtml}</div>
      </div>`;
    list.appendChild(card);
  });
}

function toggleCard(i) {
  const det  = document.getElementById('det'  + i);
  const chev = document.getElementById('chev' + i);
  det.classList.toggle('open');
  chev.classList.toggle('open');
}
</script>
</body>
</html>
